<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitVision - Exercise Admin Console</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(22, 26, 35, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-color: #ffb703;
            --primary-hover: #fb8500;
            --text-color: #f8f9fa;
            --text-muted: #8b9bb4;
            --success-color: #2ec4b6;
            --error-color: #e63946;
            --info-color: #0077b6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding: 2rem;
            background-image: radial-gradient(circle at 15% 15%, rgba(255, 183, 3, 0.03) 0%, transparent 40%),
                              radial-gradient(circle at 85% 85%, rgba(251, 133, 0, 0.03) 0%, transparent 40%);
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-section h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(255, 183, 3, 0.2);
        }

        .logo-section p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.2rem;
        }

        .auth-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 12px;
        }

        .auth-bar label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .auth-bar input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.4rem 0.8rem;
            color: var(--text-color);
            font-size: 0.85rem;
            width: 250px;
        }

        .layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
        }

        /* Sidebar Exercises List */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            height: fit-content;
        }

        .search-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.6rem 0.8rem;
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.9rem;
        }

        .exercise-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .exercise-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            padding: 0.8rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .exercise-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary-color);
        }

        .exercise-item.active {
            background: rgba(255, 183, 3, 0.1);
            border-color: var(--primary-color);
        }

        .exercise-item h4 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 0.2rem;
        }

        .exercise-item span {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Editor Area */
        .editor-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(255, 183, 3, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn {
            background: var(--primary-color);
            color: #000;
            font-weight: 700;
            font-size: 0.95rem;
            border: none;
            border-radius: 12px;
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 183, 3, 0.2);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--text-muted);
        }

        .btn-danger {
            background: var(--error-color);
            color: #fff;
        }

        .btn-danger:hover {
            background: #bd2130;
            box-shadow: 0 6px 15px rgba(230, 57, 70, 0.2);
        }

        /* Dynamic row containers */
        .dynamic-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
            align-items: center;
        }

        .dynamic-row input {
            flex: 1;
        }

        .dynamic-row button {
            background: rgba(230, 57, 70, 0.15);
            color: var(--error-color);
            border: 1px solid rgba(230, 57, 70, 0.3);
            border-radius: 8px;
            padding: 0.7rem;
            cursor: pointer;
            font-weight: bold;
        }

        .dynamic-row button:hover {
            background: var(--error-color);
            color: #fff;
        }

        /* Toast feedback alerts */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success { background: var(--success-color); color: #000; }
        .toast.error { background: var(--error-color); color: #fff; }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <div class="logo-section">
            <h1>FIT VISION</h1>
            <p>Exercise Content Management Console</p>
        </div>
        <div class="auth-bar">
            <label for="authTokenInput">Bearer Token</label>
            <input type="password" id="authTokenInput" placeholder="Paste Auth Token for modifications...">
        </div>
    </header>

    <div class="layout">
        <!-- Sidebar Exercises List -->
        <div class="sidebar">
            <button class="btn" style="width:100%; margin-bottom: 0.5rem;" onclick="clearFormForNew()">+ Add New Exercise</button>
            <input type="text" class="search-box" id="searchBar" placeholder="Search exercises..." onkeyup="filterExercises()">
            
            <div class="exercise-list" id="exerciseList">
                <div style="text-align: center; color: var(--text-muted); padding: 2rem 0;">Loading exercises...</div>
            </div>
        </div>

        <!-- Editor Container -->
        <div class="editor-container">
            <h2 id="editorTitle">Add New Exercise</h2>
            
            <form id="exerciseForm" onsubmit="event.preventDefault(); saveExercise();">
                <input type="hidden" id="exerciseId" value="">

                <div class="form-grid">
                    <div class="input-group">
                        <label for="title">Exercise Title</label>
                        <input type="text" id="title" required placeholder="e.g. Diamond Push-Up">
                    </div>
                    <div class="input-group">
                        <label for="primaryMuscle">Primary Muscle Worked</label>
                        <input type="text" id="primaryMuscle" required placeholder="e.g. Chest, Quads, Shoulders">
                    </div>
                    <div class="input-group">
                        <label for="exerciseType">Exercise Type</label>
                        <select id="exerciseType" required>
                            <option value="Strength">Strength</option>
                            <option value="Cardio">Cardio</option>
                            <option value="Flexibility">Flexibility</option>
                            <option value="Balance">Balance</option>
                            <option value="HIIT">HIIT</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="videoUrl">Animated Video / GIF URL</label>
                        <input type="text" id="videoUrl" placeholder="e.g. https://domain.com/pushup.gif">
                    </div>

                    <!-- Muscle Worked percentages -->
                    <div class="input-group full-width">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 0.5rem;">
                            <label>Muscles Worked Percentages</label>
                            <button type="button" class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;" onclick="addMuscleWorkedRow()">+ Add Muscle</button>
                        </div>
                        <div id="musclePercentagesContainer">
                            <!-- Dynamic rows injected here -->
                        </div>
                    </div>

                    <div class="input-group full-width">
                        <label for="suggestedWorkouts">Suggested Workouts (comma-separated)</label>
                        <input type="text" id="suggestedWorkouts" placeholder="e.g. Upper Body Strength, Chest Shredder">
                    </div>

                    <!-- How to perform -->
                    <div class="input-group full-width">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 0.5rem;">
                            <label>How-To-Perform Instructions</label>
                            <button type="button" class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;" onclick="addStepRow()">+ Add Step</button>
                        </div>
                        <div id="instructionsContainer">
                            <!-- Dynamic step rows -->
                        </div>
                    </div>

                    <!-- Safety Tips -->
                    <div class="input-group full-width">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 0.5rem;">
                            <label>Safety & Alignment Tips</label>
                            <button type="button" class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;" onclick="addTipRow()">+ Add Tip</button>
                        </div>
                        <div id="tipsContainer">
                            <!-- Dynamic tip rows -->
                        </div>
                    </div>
                </div>

                <div style="display:flex; justify-content: space-between; align-items:center;">
                    <div style="display:flex; gap:1rem;">
                        <button type="submit" class="btn">Save Exercise</button>
                        <button type="button" class="btn btn-outline" onclick="clearFormForNew()">Cancel</button>
                    </div>
                    <button type="button" id="deleteBtn" class="btn btn-danger hidden" onclick="deleteExercise()">Delete Exercise</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="toast" id="toast">Feedback message</div>

<script>
    let exercisesCache = [];
    let currentSelectedId = null;

    // Load token from localStorage if present
    const savedToken = localStorage.getItem("fitvision_token");
    if (savedToken) {
        document.getElementById("authTokenInput").value = savedToken;
    }

    // Capture token changes and persist
    document.getElementById("authTokenInput").addEventListener("input", (e) => {
        localStorage.setItem("fitvision_token", e.target.value.trim());
    });

    function getAuthHeaders() {
        const token = document.getElementById("authTokenInput").value.trim();
        if (!token) return { "Content-Type": "application/json" };
        return {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
        };
    }

    function showToast(message, type = "success") {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.className = `toast show ${type}`;
        setTimeout(() => {
            toast.classList.remove("show");
        }, 3000);
    }

    // Dynamic Row Builders
    function addMuscleWorkedRow(muscleName = "", percentage = "") {
        const container = document.getElementById("musclePercentagesContainer");
        const div = document.createElement("div");
        div.className = "dynamic-row muscle-row";
        div.innerHTML = `
            <input type="text" placeholder="Muscle Name (e.g. Chest)" class="muscle-name" value="${muscleName}" required>
            <input type="number" placeholder="Percentage (e.g. 80)" class="muscle-pct" value="${percentage}" required min="1" max="100">
            <button type="button" onclick="this.parentElement.remove()">✕</button>
        `;
        container.appendChild(div);
    }

    function addStepRow(stepText = "") {
        const container = document.getElementById("instructionsContainer");
        const div = document.createElement("div");
        div.className = "dynamic-row step-row";
        div.innerHTML = `
            <input type="text" placeholder="e.g. Place hands shoulder-width apart..." class="step-text" value="${stepText}" required>
            <button type="button" onclick="this.parentElement.remove()">✕</button>
        `;
        container.appendChild(div);
    }

    function addTipRow(tipText = "") {
        const container = document.getElementById("tipsContainer");
        const div = document.createElement("div");
        div.className = "dynamic-row tip-row";
        div.innerHTML = `
            <input type="text" placeholder="e.g. Keep your core engaged to avoid arching your back..." class="tip-text" value="${tipText}" required>
            <button type="button" onclick="this.parentElement.remove()">✕</button>
        `;
        container.appendChild(div);
    }

    // API Interaction
    async function loadExercises() {
        try {
            const res = await fetch("/exercises");
            if (res.ok) {
                exercisesCache = await res.ok ? await res.json() : [];
                renderExerciseList(exercisesCache);
            } else {
                showToast("Failed to fetch exercises list", "error");
            }
        } catch (e) {
            showToast("Network Error: " + e.message, "error");
        }
    }

    function renderExerciseList(list) {
        const container = document.getElementById("exerciseList");
        container.innerHTML = "";
        
        if (list.length === 0) {
            container.innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 2rem 0;">No exercises registered.</div>`;
            return;
        }

        list.forEach(ex => {
            const btn = document.createElement("button");
            btn.className = `exercise-item ${currentSelectedId === ex.id ? 'active' : ''}`;
            btn.onclick = () => selectExercise(ex.id);
            btn.innerHTML = `
                <h4>${ex.title}</h4>
                <span>${ex.primary_muscle} | ${ex.exercise_type}</span>
            `;
            container.appendChild(btn);
        });
    }

    function filterExercises() {
        const query = document.getElementById("searchBar").value.toLowerCase().trim();
        const filtered = exercisesCache.filter(ex => 
            ex.title.toLowerCase().includes(query) || 
            ex.primary_muscle.toLowerCase().includes(query) ||
            ex.exercise_type.toLowerCase().includes(query)
        );
        renderExerciseList(filtered);
    }

    function selectExercise(id) {
        currentSelectedId = id;
        renderExerciseList(exercisesCache); // Update active class highlighted
        
        const exercise = exercisesCache.find(e => e.id === id);
        if (!exercise) return;

        document.getElementById("editorTitle").innerText = `Edit: ${exercise.title}`;
        document.getElementById("exerciseId").value = exercise.id;
        document.getElementById("title").value = exercise.title;
        document.getElementById("primaryMuscle").value = exercise.primary_muscle;
        document.getElementById("exerciseType").value = exercise.exercise_type;
        document.getElementById("videoUrl").value = exercise.video_url || "";
        document.getElementById("suggestedWorkouts").value = (exercise.suggested_workouts || []).join(", ");

        // Clean containers
        document.getElementById("musclePercentagesContainer").innerHTML = "";
        document.getElementById("instructionsContainer").innerHTML = "";
        document.getElementById("tipsContainer").innerHTML = "";

        // Re-inject muscle rows
        if (exercise.muscles_worked_pct) {
            Object.entries(exercise.muscles_worked_pct).forEach(([name, pct]) => {
                addMuscleWorkedRow(name, pct);
            });
        }

        // Re-inject instructions
        if (exercise.instructions) {
            exercise.instructions.forEach(step => addStepRow(step));
        }

        // Re-inject tips
        if (exercise.safety_tips) {
            exercise.safety_tips.forEach(tip => addTipRow(tip));
        }

        document.getElementById("deleteBtn").classList.remove("hidden");
    }

    function clearFormForNew() {
        currentSelectedId = null;
        renderExerciseList(exercisesCache);

        document.getElementById("editorTitle").innerText = "Add New Exercise";
        document.getElementById("exerciseId").value = "";
        document.getElementById("exerciseForm").reset();

        document.getElementById("musclePercentagesContainer").innerHTML = "";
        document.getElementById("instructionsContainer").innerHTML = "";
        document.getElementById("tipsContainer").innerHTML = "";

        document.getElementById("deleteBtn").classList.add("hidden");
    }

    async function saveExercise() {
        const id = document.getElementById("exerciseId").value;
        const title = document.getElementById("title").value.trim();
        const primary_muscle = document.getElementById("primaryMuscle").value.trim();
        const exercise_type = document.getElementById("exerciseType").value;
        const video_url = document.getElementById("videoUrl").value.trim() || null;
        
        const suggestedText = document.getElementById("suggestedWorkouts").value;
        const suggested_workouts = suggestedText ? suggestedText.split(",").map(w => w.trim()).filter(w => w) : [];

        // Build muscles worked dict
        const muscles_worked_pct = {};
        document.querySelectorAll(".muscle-row").forEach(row => {
            const name = row.querySelector(".muscle-name").value.trim();
            const pct = parseFloat(row.querySelector(".muscle-pct").value);
            if (name && !isNaN(pct)) {
                muscles_worked_pct[name] = pct;
            }
        });

        // Build instructions list
        const instructions = [];
        document.querySelectorAll(".step-row").forEach(row => {
            const step = row.querySelector(".step-text").value.trim();
            if (step) instructions.push(step);
        });

        // Build safety tips list
        const safety_tips = [];
        document.querySelectorAll(".tip-row").forEach(row => {
            const tip = row.querySelector(".tip-text").value.trim();
            if (tip) safety_tips.push(tip);
        });

        const payload = {
            title,
            primary_muscle,
            exercise_type,
            video_url,
            muscles_worked_pct,
            suggested_workouts,
            instructions,
            safety_tips
        };

        const isUpdate = !!id;
        const url = isUpdate ? `/exercises/${id}` : "/exercises";
        const method = isUpdate ? "PUT" : "POST";

        try {
            const res = await fetch(url, {
                method: method,
                headers: getAuthHeaders(),
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if (res.ok) {
                showToast(isUpdate ? "Exercise updated successfully!" : "Exercise created successfully!", "success");
                clearFormForNew();
                await loadExercises();
            } else {
                showToast(`Failed: ${data.detail || "Unknown error"}`, "error");
            }
        } catch (e) {
            showToast("Connection Error: " + e.message, "error");
        }
    }

    async function deleteExercise() {
        const id = document.getElementById("exerciseId").value;
        if (!id) return;

        if (!confirm("Are you sure you want to delete this exercise?")) return;

        try {
            const res = await fetch(`/exercises/${id}`, {
                method: "DELETE",
                headers: getAuthHeaders()
            });

            const data = await res.json();
            if (res.ok) {
                showToast("Exercise deleted successfully!", "success");
                clearFormForNew();
                await loadExercises();
            } else {
                showToast(`Delete failed: ${data.detail || "Unknown error"}`, "error");
            }
        } catch (e) {
            showToast("Connection Error: " + e.message, "error");
        }
    }

    // Initial Load
    loadExercises();
</script>

</body>
</html>
